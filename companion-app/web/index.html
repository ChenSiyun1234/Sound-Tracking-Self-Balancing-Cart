<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BalanceBot — Live Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- Chart.js via CDN: no build step, runs straight from `python -m api.server`. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <main class="app">
    <header>
      <h1>BalanceBot — Live Dashboard</h1>
      <span id="conn" class="pill off">connecting…</span>
    </header>

    <section class="status" id="status">
      <div class="stat"><span class="stat-label">Pitch</span><span class="stat-value" id="pitch">—</span></div>
      <div class="stat"><span class="stat-label">PID out</span><span class="stat-value" id="pid">—</span></div>
      <div class="stat"><span class="stat-label">Heading</span><span class="stat-value" id="heading">—</span></div>
      <div class="stat" id="state-card"><span class="stat-label">State</span><span class="stat-value" id="state">—</span></div>
      <div class="stat"><span class="stat-label">Source</span><span class="stat-value" id="source">—</span></div>
    </section>

    <section class="chart-wrap">
      <canvas id="chart" height="160" aria-label="Pitch angle over time"></canvas>
    </section>

    <form class="pid-form" id="pid-form">
      <fieldset>
        <legend>Angle (PD)</legend>
        <label>Kp <input type="number" step="0.001" name="angle_kp" /></label>
        <label>Kd <input type="number" step="0.001" name="angle_kd" /></label>
      </fieldset>
      <fieldset>
        <legend>Velocity (PI)</legend>
        <label>Kp <input type="number" step="0.001" name="vel_kp" /></label>
        <label>Ki <input type="number" step="0.001" name="vel_ki" /></label>
      </fieldset>
      <fieldset>
        <legend>Heading (PD)</legend>
        <label>Kp <input type="number" step="0.001" name="heading_kp" /></label>
        <label>Kd <input type="number" step="0.001" name="heading_kd" /></label>
      </fieldset>
      <div class="actions">
        <button type="submit">Apply gains</button>
        <button type="button" id="reload">Reload</button>
        <span class="error" id="form-error"></span>
      </div>
    </form>

    <footer>
      <p>Live telemetry over Server-Sent Events · gains pushed over REST · source switches
         between the built-in simulator and AWS&nbsp;IoT.</p>
    </footer>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
